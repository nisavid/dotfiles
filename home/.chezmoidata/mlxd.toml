[mlxd]
# Personal deployment values for the mlxctl deployment contract.
label = "io.nisavid.mlxd"
sourceDir = "src/nisavid/systools/tools/mlxctl"
binDir = ".local/bin"
configDir = ".config/mlxd"
stateDir = ".local/state/mlxd"
logDir = "Library/Logs/mlxd"
launchctlBin = "/bin/launchctl"

[mlxd.optiq]
targetHostname = "hatchery"
runtimePackage = "mlx-optiq==0.2.15"
huggingFacePackage = "huggingface-hub==1.22.0"
modelRepository = "mlx-community/Qwen3.6-35B-A3B-OptiQ-4bit"
modelRevision = "70a3aa32c7feef511182bf16aa332f37e8d82014"
modelDir = ".local/share/mlxd/models/qwen36-optiq"
kvConfig = "kv_config.json"
kvSha256 = "34846a2678e2d390454af58e9296859b730beaa3dc6974644262e2d07110edc5"

[mlxd.optiq.clients]
baseUrl = "http://127.0.0.1:8766/v1"
contextWindow = 32768
codexProvider = "mlx-optiq"
hindsightProvider = "lmstudio"
hindsightProfile = "systalyze"

[mlxd.config]
schemaVersion = 1
metricsRetentionDays = 7

[mlxd.config.models.llama-3b]
reference = "mlx-community/Llama-3.2-3B-Instruct-4bit"

[mlxd.config.models.qwen-7b]
reference = "mlx-community/Qwen2.5-7B-Instruct-4bit"

[mlxd.config.models.qwen36-optiq]
localDir = ".local/share/mlxd/models/qwen36-optiq"
targetHostname = "hatchery"

[mlxd.config.servers.mlx]
type = "mlx_lm"
model = "llama-3b"
port = 8765

[mlxd.config.servers.optiq]
type = "optiq"
model = "qwen36-optiq"
port = 8766
targetHostname = "hatchery"

[mlxd.config.servers.optiq.options]
kv_config = "kv_config.json"
max_context = 32768
mtp = true
temp = 0.0
