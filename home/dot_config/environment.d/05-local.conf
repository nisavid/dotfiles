# vim: ft=sh
# shellcheck shell=sh disable=SC2034

# ~/.local/bin on PATH for all (incl. non-interactive) zsh.  Loaded at 05- so it
# precedes app-specific system-wide paths (in the inherited PATH) but follows
# app-specific user-customized paths (e.g. pyenv at 20-), which prepend ahead of
# it.  zshrc.zsh re-adds it via $BIN_HOME for interactive shells.
PATH=$HOME/.local/bin:$PATH
