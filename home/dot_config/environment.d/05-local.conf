# vim: ft=sh
# shellcheck shell=sh disable=SC2034

# ~/.local/bin on PATH for all (incl. non-interactive) zsh.  Loaded at 05- so it
# precedes app-specific system-wide paths (homebrew at 00-, podman at 01-) but
# follows app-specific user-customized paths (e.g. pyenv at 20-), which prepend
# ahead of it.  This is the single source of truth; zshrc.zsh no longer re-adds it.
PATH=$HOME/.local/bin:$PATH
